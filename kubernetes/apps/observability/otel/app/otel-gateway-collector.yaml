apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  labels:
    sidecar.istio.io/inject: 'false'
spec:
  mode: deployment
  replicas: 2
  serviceAccount: otel-collectors-sa
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25

      transform/mark_routed:
        log_statements:
          - context: resource
            statements:
              - set(attributes["gateway.routed"], "true")

      filter/drop_unmatched:
        logs:
          log_record:
            - 'resource.attributes["gateway.routed"] == "false"'

      transform/remove_routing_marker:
        log_statements:
          - context: resource
            statements:
              - delete_key(attributes, "gateway.routed")

      batch/platform:
        send_batch_max_size: 1000
        timeout: 30s
        send_batch_size: 800

      batch/team_a:
        send_batch_max_size: 1000
        timeout: 30s
        send_batch_size: 800

      batch/team_b:
        send_batch_max_size: 1000
        timeout: 30s
        send_batch_size: 800
    exporters:
      otlphttp/platform:
        endpoint: "https://otlp.nr-data.net"
        headers:
          api-key: ${env:NR_LICENSE_KEY_PLATFORM}
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      otlphttp/team_a:
        endpoint: "https://otlp.nr-data.net"
        headers:
          api-key: ${env:NR_LICENSE_KEY_TEAM_A}
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

      otlphttp/team_b:
        endpoint: "https://otlp.nr-data.net"
        headers:
          api-key: ${env:NR_LICENSE_KEY_TEAM_B}
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s

    # ---------------------------------------------------------------------------
    # CONNECTORS
    # ---------------------------------------------------------------------------
    connectors:

      # -----------------------------------------------------------------------
      # METRICS ROUTING
      # All metrics go to the platform account regardless of source.
      # The routing connector is used here for consistency and future-proofing
      # (easy to add a condition later to split metrics by cluster, source, etc.)
      # Default pipeline catches everything - no conditions needed today.
      # -----------------------------------------------------------------------
      routing/metrics:
        default_pipelines: [metrics/platform]
        error_mode: propagate
        table: []
        # Future example - split infra vs app metrics to different accounts:
        # table:
        #   - context: resource
        #     condition: resource.attributes["k8s.namespace.name"] == "monitoring"
        #     pipelines: [metrics/platform]

      # -----------------------------------------------------------------------
      # LOGS ROUTING
      # Routes logs to different NR accounts based on k8s.namespace.name.
      # Matching is done on the resource context (resource attributes).
      # Rules are evaluated top-to-bottom, first match wins.
      # Logs from namespaces not matching any rule fall through to default_pipelines
      # which sends them to the platform account.
      #
      # TO ADD A NEW TEAM:
      #   1. Add namespace names to the condition below
      #   2. Add a new logs/team_X egress pipeline
      #   3. Add a new otlphttp/team_X exporter
      #   4. Add NR_LICENSE_KEY_TEAM_X env var + secret
      # -----------------------------------------------------------------------
      routing/logs:
        default_pipelines: [logs/platform]
        error_mode: propagate
        table:
          # --- Team A namespaces ---
          # Add all namespaces that belong to team A here
          - context: resource
            condition: >
              resource.attributes["k8s.namespace.name"] == "team-a-prod"
              or resource.attributes["k8s.namespace.name"] == "team-a-staging"
              or resource.attributes["k8s.namespace.name"] == "team-a-dev"
            pipelines: [logs/team_a]

          # --- Team B namespaces ---
          - context: resource
            condition: >
              resource.attributes["k8s.namespace.name"] == "team-b-prod"
              or resource.attributes["k8s.namespace.name"] == "team-b-staging"
            pipelines: [logs/team_b]

    service:
      pipelines:
        metrics/ingress:
          receivers: [otlp]
          processors:
            - memory_limiter
          exporters:
            - routing/metrics

        metrics/platform:
          receivers: [routing/metrics]
          processors:
            - batch/platform
          exporters:
            - otlphttp/platform

        logs/ingress:
          receivers: [otlp]
          processors:
            - memory_limiter
            - transform/mark_unrouted
          exporters:
            - routing/logs

        logs/platform:
          receivers: [routing/logs]
          processors:
            # - filter/drop_unmatched   # uncomment to switch to drop mode
            - transform/remove_routing_marker
            - batch/platform
          exporters:
            - otlphttp/platform

        logs/team_a:
          receivers: [routing/logs]
          processors:
            - transform/mark_routed
            - transform/remove_routing_marker
            - batch/team_a
          exporters:
            - otlphttp/team_a

        logs/team_b:
          receivers: [routing/logs]
          processors:
            - transform/mark_routed
            - transform/remove_routing_marker
            - batch/team_b
          exporters:
            - otlphttp/team_b
