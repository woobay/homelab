apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-deployment
  labels:
    sidecar.istio.io/inject: 'false'
spec:
  mode: deployment
  replicas: 1
  serviceAccount: otel-collectors-sa
  env:
    - name: CLUSTER_NAME
      valueFrom:
        secretKeyRef:
          name: otel-collector-config
          key: cluster_name
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: 1m
              kubernetes_sd_configs:
                - role: service
                  namespaces:
                    names:
                      - kube-system
              relabel_configs:
                - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
                  regex: kube-state-metrics
                  action: keep
                - action: replace
                  target_label: job_label
                  replacement: kube-state-metrics

            - job_name: apiserver
              scrape_interval: 1m
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: endpoints
                  namespaces:
                    names:
                      - default
              relabel_configs:
                - source_labels:
                    - __meta_kubernetes_service_name
                    - __meta_kubernetes_endpoint_port_name
                  regex: kubernetes;https
                  action: keep
                - action: replace
                  target_label: job_label
                  replacement: apiserver
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: false
                server_name: kubernetes

            - job_name: controller-manager
              scrape_interval: 1m
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - kube-system
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_component]
                  regex: kube-controller-manager
                  action: keep
                - action: replace
                  target_label: job_label
                  replacement: controller-manager
                - source_labels: [__address__]
                  regex: (.+)(?::\d+)
                  replacement: $${1}:10257
                  target_label: __address__
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true

            - job_name: scheduler
              scrape_interval: 1m
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - kube-system
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_component]
                  regex: kube-scheduler
                  action: keep
                - action: replace
                  target_label: job_label
                  replacement: scheduler
                - source_labels: [__address__]
                  regex: (.+)(?::\d+)
                  replacement: $${1}:10259
                  target_label: __address__
              scheme: https
              tls_config:
                ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
                insecure_skip_verify: true

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25

      resourcedetection/env:
        detectors: ["env", "system"]
        override: false
        system:
          hostname_sources: ["os"]
          resource_attributes:
            host.name:
              enabled: false

      resource/newrelic:
        attributes:
          - key: k8s.cluster.name
            action: upsert
            value: ${env:CLUSTER_NAME}
          - key: newrelic.entity.type
            action: upsert
            value: "k8s"

      metricstransform/k8s_cluster_info:
        transforms:
          - include: kubernetes_build_info
            action: update
            new_name: k8s.cluster.info

      filter/lowdatamode:
        metrics:
          include:
            match_type: strict
            metric_names:
              # --- API Server ---
              - apiserver_storage_objects
              - go_goroutines
              - go_threads
              - process_resident_memory_bytes
              # Renamed from kubernetes_build_info
              - k8s.cluster.info
              # --- KubeStateMetrics: CronJob ---
              - kube_cronjob_created
              - kube_cronjob_spec_suspend
              - kube_cronjob_status_active
              - kube_cronjob_status_last_schedule_time
              # --- KubeStateMetrics: DaemonSet ---
              - kube_daemonset_created
              - kube_daemonset_status_current_number_scheduled
              - kube_daemonset_status_desired_number_scheduled
              - kube_daemonset_status_number_available
              - kube_daemonset_status_number_misscheduled
              - kube_daemonset_status_number_ready
              - kube_daemonset_status_number_unavailable
              - kube_daemonset_status_updated_number_scheduled
              # --- KubeStateMetrics: Deployment ---
              - kube_deployment_created
              - kube_deployment_metadata_generation
              - kube_deployment_spec_replicas
              - kube_deployment_spec_strategy_rollingupdate_max_surge
              - kube_deployment_status_condition
              - kube_deployment_status_observed_generation
              - kube_deployment_status_replicas
              - kube_deployment_status_replicas_available
              - kube_deployment_status_replicas_ready
              - kube_deployment_status_replicas_unavailable
              - kube_deployment_status_replicas_updated
              - kube_deployment_labels
              - kube_deployment_annotations
              # --- KubeStateMetrics: HPA ---
              - kube_horizontalpodautoscaler_spec_max_replicas
              - kube_horizontalpodautoscaler_spec_min_replicas
              - kube_horizontalpodautoscaler_status_condition
              - kube_horizontalpodautoscaler_status_current_replicas
              - kube_horizontalpodautoscaler_status_desired_replicas
              # --- KubeStateMetrics: Job ---
              - kube_job_complete
              - kube_job_created
              - kube_job_failed
              - kube_job_owner
              - kube_job_spec_active_deadline_seconds
              - kube_job_spec_completions
              - kube_job_spec_parallelism
              - kube_job_status_active
              - kube_job_status_completion_time
              - kube_job_status_failed
              - kube_job_status_start_time
              - kube_job_status_succeeded
              # --- KubeStateMetrics: Namespace ---
              - kube_namespace_labels
              - kube_namespace_annotations
              - kube_namespace_status_phase
              - kube_namespace_created
              # --- KubeStateMetrics: Node ---
              - kube_node_status_allocatable
              - kube_node_status_capacity
              - kube_node_status_condition
              # --- KubeStateMetrics: PersistentVolume ---
              - kube_persistentvolume_capacity_bytes
              - kube_persistentvolume_created
              - kube_persistentvolume_info
              - kube_persistentvolume_status_phase
              # --- KubeStateMetrics: PersistentVolumeClaim ---
              - kube_persistentvolumeclaim_access_mode
              - kube_persistentvolumeclaim_created
              - kube_persistentvolumeclaim_info
              - kube_persistentvolumeclaim_resource_requests_storage_bytes
              - kube_persistentvolumeclaim_status_phase
              # --- KubeStateMetrics: Pod ---
              - kube_pod_container_info
              - kube_pod_container_resource_limits
              - kube_pod_container_resource_requests
              - kube_pod_container_status_last_terminated_exitcode
              - kube_pod_container_status_last_terminated_reason
              - kube_pod_container_status_last_terminated_timestamp
              - kube_pod_container_status_phase
              - kube_pod_container_status_ready
              - kube_pod_container_status_restarts_total
              - kube_pod_container_status_waiting_reason
              - kube_pod_created
              - kube_pod_deletion_timestamp
              - kube_pod_info
              - kube_pod_owner
              - kube_pod_start_time
              - kube_pod_status_phase
              - kube_pod_status_ready
              - kube_pod_status_ready_time
              - kube_pod_status_scheduled
              - kube_pod_status_scheduled_time
              - kube_pod_labels
              - kube_pod_annotations
              # --- KubeStateMetrics: ReplicaSet ---
              - kube_replicaset_owner
              - kube_replicaset_created
              # --- KubeStateMetrics: ResourceQuota ---
              - kube_resourcequota
              - kube_resourcequota_created
              # --- KubeStateMetrics: Service ---
              - kube_service_created
              - kube_service_info
              - kube_service_spec_type
              - kube_service_status_load_balancer_ingress
              # --- KubeStateMetrics: StatefulSet ---
              - kube_statefulset_created
              - kube_statefulset_persistentvolumeclaim_retention_policy
              - kube_statefulset_replicas
              - kube_statefulset_status_current_revision
              - kube_statefulset_status_replicas
              - kube_statefulset_status_replicas_available
              - kube_statefulset_status_replicas_current
              - kube_statefulset_status_replicas_ready
              - kube_statefulset_status_replicas_updated

      groupbyattrs:
        keys:
          - pod
          - uid
          - container
          - daemonset
          - replicaset
          - statefulset
          - deployment
          - cronjob
          - job_name
          - horizontalpodautoscaler
          - persistentvolume
          - persistentvolumeclaim
          - resourcequota
          - node
          - namespace

      transform/ksm:
        metric_statements:
          - delete_key(resource.attributes, "k8s.node.name")
          - delete_key(resource.attributes, "k8s.namespace.name")
          - delete_key(resource.attributes, "k8s.pod.uid")
          - delete_key(resource.attributes, "k8s.pod.name")
          - delete_key(resource.attributes, "k8s.container.name")
          - delete_key(resource.attributes, "k8s.replicaset.name")
          - delete_key(resource.attributes, "k8s.deployment.name")
          - delete_key(resource.attributes, "k8s.statefulset.name")
          - delete_key(resource.attributes, "k8s.daemonset.name")
          - delete_key(resource.attributes, "k8s.job.name")
          - delete_key(resource.attributes, "k8s.cronjob.name")
          - delete_key(resource.attributes, "k8s.hpa.name")
          - delete_key(resource.attributes, "k8s.resourcequota.name")
          - delete_key(resource.attributes, "k8s.pvc.name")
          - set(resource.attributes["k8s.pod.uid"], resource.attributes["uid"])
          - set(resource.attributes["k8s.node.name"], resource.attributes["node"])
          - set(resource.attributes["k8s.namespace.name"], resource.attributes["namespace"])
          - set(resource.attributes["k8s.pod.name"], resource.attributes["pod"])
          - set(resource.attributes["k8s.container.name"], resource.attributes["container"])
          - set(resource.attributes["k8s.replicaset.name"], resource.attributes["replicaset"])
          - set(resource.attributes["k8s.deployment.name"], resource.attributes["deployment"])
          - set(resource.attributes["k8s.statefulset.name"], resource.attributes["statefulset"])
          - set(resource.attributes["k8s.daemonset.name"], resource.attributes["daemonset"])
          - set(resource.attributes["k8s.job.name"], resource.attributes["job_name"])
          - set(resource.attributes["k8s.cronjob.name"], resource.attributes["cronjob"])
          - set(resource.attributes["k8s.hpa.name"], resource.attributes["horizontalpodautoscaler"])
          - set(resource.attributes["k8s.resourcequota.name"], resource.attributes["resourcequota"])
          - set(resource.attributes["k8s.pvc.name"], resource.attributes["persistentvolumeclaim"])
          - set(resource.attributes["k8s.volume.name"], resource.attributes["persistentvolume"])
          - delete_key(resource.attributes, "uid")
          - delete_key(resource.attributes, "node")
          - delete_key(resource.attributes, "namespace")
          - delete_key(resource.attributes, "pod")
          - delete_key(resource.attributes, "container")
          - delete_key(resource.attributes, "replicaset")
          - delete_key(resource.attributes, "deployment")
          - delete_key(resource.attributes, "statefulset")
          - delete_key(resource.attributes, "daemonset")
          - delete_key(resource.attributes, "job_name")
          - delete_key(resource.attributes, "cronjob")
          - delete_key(resource.attributes, "horizontalpodautoscaler")
          - delete_key(resource.attributes, "resourcequota")
          - delete_key(resource.attributes, "persistentvolumeclaim")
          - delete_key(resource.attributes, "persistentvolume")

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.daemonset.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - k8s.replicaset.name
            - k8s.statefulset.name
            - k8s.cronjob.name
            - k8s.job.name
        pod_association:
          - sources:
            - from: resource_attribute
              name: k8s.pod.uid
          - sources:
            - from: resource_attribute
              name: k8s.pod.name

      transform/low_data_mode_inator:
        metric_statements:
          - context: metric
            statements:
              - set(metric.description, "")
              - set(metric.unit, "")
          - context: datapoint
            statements:
              - delete_key(datapoint.attributes, "id")
              - delete_key(datapoint.attributes, "name")
              - delete_key(datapoint.attributes, "interface")
              - delete_key(datapoint.attributes, "cpu")

      resource/low_data_mode_inator:
        attributes:
          - key: http.scheme
            action: delete
          - key: net.host.name
            action: delete
          - key: net.host.port
            action: delete
          - key: url.scheme
            action: delete
          - key: server.address
            action: delete

      cumulativetodelta:

      batch:
        send_batch_max_size: 1000
        timeout: 30s
        send_batch_size: 800

    exporters:
      debug:
        verbosity: detailed
      # otlp/gateway:
      #   endpoint: otel-gateway-collector:4317
      #   tls:
      #     insecure: true
      #   sending_queue:
      #     enabled: true
      #     num_consumers: 4
      #     queue_size: 1000
      #   retry_on_failure:
      #     enabled: true
      #     initial_interval: 5s
      #     max_interval: 30s
      #     max_elapsed_time: 300s

    service:
      pipelines:
        metrics/cluster:
          receivers:
            - prometheus
          processors:
            - memory_limiter
            - metricstransform/k8s_cluster_info
            - filter/lowdatamode
            - resourcedetection/env
            - resource/low_data_mode_inator
            - groupbyattrs
            - transform/ksm
            - k8sattributes
            - resource/newrelic
            - transform/low_data_mode_inator
            - cumulativetodelta
            - batch
          exporters:
            - otlp/gateway
