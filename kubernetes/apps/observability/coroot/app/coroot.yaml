apiVersion: coroot.com/v1
kind: Coroot
metadata:
  name: coroot
  namespace: coroot
spec:
  clickhouse:
    storage:
      className: nfs-client
      size: 20Gi
    shards: 2
    replicas: 2
  storage:
    className: nfs-client
    size: 10Gi
  prometheus:
    storage:
      className: nfs-client
      size: 10Gi
 

